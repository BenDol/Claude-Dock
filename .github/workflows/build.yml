name: Build

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'scripts/**'
      - 'resources/**'
      - 'package.json'
      - 'package-lock.json'
      - 'tsconfig*.json'
      - 'electron.vite.config.*'
      - 'vitest.config.*'
      - '.github/workflows/build.yml'
  pull_request:
    branches: [main]
    paths:
      - 'src/**'
      - 'scripts/**'
      - 'resources/**'
      - 'package.json'
      - 'package-lock.json'
      - 'tsconfig*.json'
      - 'electron.vite.config.*'
      - 'vitest.config.*'
      - '.github/workflows/build.yml'
  workflow_dispatch:
    inputs:
      skip_tests:
        description: 'Skip tests'
        type: boolean
        default: false
      force_full_build:
        description: 'Force full app build even if only plugins changed'
        type: boolean
        default: false

jobs:
  # Determine whether this push only touches plugin source directories.
  # If so, we can skip the expensive electron-builder packaging step and
  # only rebuild + publish the plugin archives.
  detect:
    runs-on: ubuntu-latest
    outputs:
      plugins_only: ${{ steps.check.outputs.plugins_only }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check if changes are plugin-only
        id: check
        shell: bash
        run: |
          # workflow_dispatch with force flag always does a full build
          if [ "${{ inputs.force_full_build }}" = "true" ]; then
            echo "plugins_only=false" >> "$GITHUB_OUTPUT"
            echo "Forced full build via workflow_dispatch"
            exit 0
          fi

          # PRs always do a full build (we want to verify packaging works)
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "plugins_only=false" >> "$GITHUB_OUTPUT"
            echo "PR build — always full"
            exit 0
          fi

          # [full-build] in commit message forces a full build
          COMMIT_MSG=$(git log -1 --format=%s HEAD)
          if echo "$COMMIT_MSG" | grep -qi '\[full-build\]'; then
            echo "plugins_only=false" >> "$GITHUB_OUTPUT"
            echo "Forced full build via [full-build] in commit message: $COMMIT_MSG"
            exit 0
          fi

          # Compare against the previous commit on push
          CHANGED=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || echo "FORCE_FULL")

          if [ "$CHANGED" = "FORCE_FULL" ]; then
            echo "plugins_only=false" >> "$GITHUB_OUTPUT"
            echo "Could not diff — full build"
            exit 0
          fi

          echo "Changed files:"
          echo "$CHANGED"

          # Plugin-only paths: files inside plugin subdirectories (e.g.
          # src/main/plugins/git-manager/...) or the archive script.
          # Top-level files in src/main/plugins/ (plugin-manager.ts, etc.)
          # are framework code that requires a full app rebuild.
          # src/shared/* also triggers a full build since both app and
          # plugins depend on shared types.
          PLUGINS_ONLY=true
          while IFS= read -r file; do
            case "$file" in
              src/main/plugins/*/*) ;;
              scripts/generate-plugin-archive.js) ;;
              *)
                echo "Non-plugin file changed: $file"
                PLUGINS_ONLY=false
                break
                ;;
            esac
          done <<< "$CHANGED"

          echo "plugins_only=$PLUGINS_ONLY" >> "$GITHUB_OUTPUT"
          echo "Result: plugins_only=$PLUGINS_ONLY"

  build:
    needs: detect
    if: needs.detect.outputs.plugins_only != 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: win
          - os: macos-latest
            platform: mac
          - os: ubuntu-latest
            platform: linux

    runs-on: ${{ matrix.os }}
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        id: setup-python
        with:
          python-version: '3.12'

      - name: Install setuptools (needed by node-gyp)
        run: pip install setuptools

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # Cache node_modules (including compiled native modules like node-pty)
      # and electron/electron-builder downloads. On cache hit this skips
      # npm ci entirely, saving ~2-3 minutes on Windows.
      - name: Cache node_modules & Electron
        id: cache-deps
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            ~/AppData/Local/electron/Cache
            ~/Library/Caches/electron
            ~/.cache/electron
            ~/AppData/Local/electron-builder/Cache
            ~/Library/Caches/electron-builder
            ~/.cache/electron-builder
          key: deps-${{ matrix.platform }}-py${{ steps.setup-python.outputs.python-version }}-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        if: steps.cache-deps.outputs.cache-hit != 'true'
        run: npm ci

      - name: Run tests
        if: inputs.skip_tests != true
        run: npx vitest run

      - name: Build app
        run: npx electron-vite build
        env:
          NODE_OPTIONS: '--max-old-space-size=4096'
          UPDATE_PROFILE: bleeding-edge
          PRODUCTION_BUILD: '1'

      - name: Generate plugin archive
        run: node scripts/generate-plugin-archive.js

      - name: Import macOS signing certificate
        if: matrix.platform == 'mac' && vars.SKIP_MAC_SIGNING != 'true'
        env:
          MAC_CERTIFICATE: ${{ secrets.MAC_CERTIFICATE }}
          MAC_CERTIFICATE_PASSWORD: ${{ secrets.MAC_CERTIFICATE_PASSWORD }}
        run: |
          if [ -z "$MAC_CERTIFICATE" ]; then
            echo "No certificate configured — skipping code signing"
            exit 0
          fi
          KEYCHAIN_PATH=$RUNNER_TEMP/build.keychain
          CERT_PATH=$RUNNER_TEMP/certificate.p12
          echo "$MAC_CERTIFICATE" | base64 --decode > "$CERT_PATH"
          security create-keychain -p "" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$MAC_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -k "" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db

      - name: Package (${{ matrix.platform }})
        run: npx electron-builder --${{ matrix.platform }} --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          CSC_IDENTITY_AUTO_DISCOVERY: 'false' # ${{ vars.SKIP_MAC_SIGNING == 'true' && 'false' || 'true' }}
          SKIP_NOTARIZE: 'true' # ${{ github.event_name == 'pull_request' && 'true' || 'false' }}

      - name: Zip win-unpacked directory
        if: matrix.platform == 'win'
        working-directory: dist/win-unpacked
        run: 7z a -tzip "../Claude-Dock-win-unpacked.zip" .
        shell: bash

      - name: Upload app artifacts
        uses: actions/upload-artifact@v4
        with:
          name: claude-dock-${{ matrix.platform }}
          path: |
            dist/*.exe
            dist/*.dmg
            dist/*.AppImage
            dist/Claude-Dock-win-unpacked.zip
          if-no-files-found: error

      # --- Full build publish: app + plugins + SHA ---
      - name: Publish full build to bleeding-edge release
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Retry wrapper for gh commands that hit transient API errors (e.g. 502)
          gh_retry() {
            local attempt
            for attempt in 1 2 3; do
              if "$@"; then return 0; fi
              if [ $attempt -lt 3 ]; then
                echo "::warning::Attempt $attempt failed, retrying in $((attempt * 10))s..."
                sleep $((attempt * 10))
              fi
            done
            echo "::error::Failed after 3 attempts: $*"
            return 1
          }

          # Ensure the release exists
          gh release view bleeding-edge &>/dev/null || \
            gh release create bleeding-edge --prerelease \
              --title "Bleeding Edge Build" \
              --notes "Automated build from the latest commit on \`main\`."

          # Write platform SHA file — when force deploy is active, append the run ID
          # to ensure the SHA differs from the running app's __BUILD_SHA__, even if
          # the commit hasn't changed. This forces the auto-updater to detect an update.
          if [ "${{ inputs.force_full_build }}" = "true" ]; then
            echo "${{ github.sha }}-force-${{ github.run_id }}" > "dist/${{ matrix.platform }}-sha.txt"
          else
            echo "${{ github.sha }}" > "dist/${{ matrix.platform }}-sha.txt"
          fi

          # Upload main artifacts first, then plugin archives, then SHA files last
          for f in dist/*.exe dist/*.dmg dist/*.AppImage dist/Claude-Dock-win-unpacked.zip; do
            [ -f "$f" ] && gh_retry gh release upload bleeding-edge "$f" --clobber
          done
          for f in dist/plugins.zip dist/plugins.update; do
            [ -f "$f" ] && gh_retry gh release upload bleeding-edge "$f" --clobber
          done
          for f in dist/*-sha.txt; do
            [ -f "$f" ] && gh_retry gh release upload bleeding-edge "$f" --clobber
          done

          # Update release notes
          gh_retry gh release edit bleeding-edge --prerelease \
            --notes "$(cat <<'EOF'
          Automated build from the latest commit on \`main\`.

          **This is a pre-release and may be unstable.**

          Commit: ${{ github.sha }}
          EOF
          )"

  # Plugins-only build: lightweight job that only rebuilds and publishes
  # the plugin archives. Runs on a single platform (plugins are platform-
  # independent JS bundles) and does NOT touch the exe or SHA files, so
  # the app auto-updater won't prompt users for a full download.
  plugins-only:
    needs: detect
    if: needs.detect.outputs.plugins_only == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history needed for per-plugin git log SHAs

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies (minimal)
        run: npm ci --ignore-scripts

      - name: Install esbuild
        run: npx esbuild --version

      - name: Generate plugin archive
        run: node scripts/generate-plugin-archive.js

      - name: Upload plugin artifacts
        uses: actions/upload-artifact@v4
        with:
          name: plugins
          path: |
            dist/plugins.zip
            dist/plugins.update
          if-no-files-found: error

      - name: Publish plugins to bleeding-edge release
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Retry wrapper for gh commands that hit transient API errors (e.g. 502)
          gh_retry() {
            local attempt
            for attempt in 1 2 3; do
              if "$@"; then return 0; fi
              if [ $attempt -lt 3 ]; then
                echo "::warning::Attempt $attempt failed, retrying in $((attempt * 10))s..."
                sleep $((attempt * 10))
              fi
            done
            echo "::error::Failed after 3 attempts: $*"
            return 1
          }

          # Ensure the release exists
          gh release view bleeding-edge &>/dev/null || \
            gh release create bleeding-edge --prerelease \
              --title "Bleeding Edge Build" \
              --notes "Automated build from the latest commit on \`main\`."

          # Upload only plugin archives — do NOT touch exe or SHA files
          for f in dist/plugins.zip dist/plugins.update; do
            [ -f "$f" ] && gh_retry gh release upload bleeding-edge "$f" --clobber
          done

          echo "Plugins-only publish complete. App binaries and SHA files unchanged."
