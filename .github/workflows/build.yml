name: Build

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'scripts/**'
      - 'package.json'
      - 'package-lock.json'
      - 'tsconfig*.json'
      - 'electron.vite.config.*'
      - 'vitest.config.*'
      - '.github/workflows/build.yml'
  pull_request:
    branches: [main]
    paths:
      - 'src/**'
      - 'scripts/**'
      - 'package.json'
      - 'package-lock.json'
      - 'tsconfig*.json'
      - 'electron.vite.config.*'
      - 'vitest.config.*'
      - '.github/workflows/build.yml'
  workflow_dispatch:
    inputs:
      skip_tests:
        description: 'Skip tests'
        type: boolean
        default: false

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: win
          - os: macos-latest
            platform: mac
          - os: ubuntu-latest
            platform: linux

    runs-on: ${{ matrix.os }}
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        id: setup-python
        with:
          python-version: '3.12'

      - name: Install setuptools (needed by node-gyp)
        run: pip install setuptools

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # Cache node_modules (including compiled native modules like node-pty)
      # and electron/electron-builder downloads. On cache hit this skips
      # npm ci entirely, saving ~2-3 minutes on Windows.
      - name: Cache node_modules & Electron
        id: cache-deps
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            ~/AppData/Local/electron/Cache
            ~/Library/Caches/electron
            ~/.cache/electron
            ~/AppData/Local/electron-builder/Cache
            ~/Library/Caches/electron-builder
            ~/.cache/electron-builder
          key: deps-${{ matrix.platform }}-py${{ steps.setup-python.outputs.python-version }}-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        if: steps.cache-deps.outputs.cache-hit != 'true'
        run: npm ci

      - name: Run tests
        if: inputs.skip_tests != true
        run: npx vitest run

      - name: Build app
        run: npx electron-vite build
        env:
          UPDATE_PROFILE: bleeding-edge
          PRODUCTION_BUILD: '1'

      - name: Generate plugin archive
        run: node scripts/generate-plugin-archive.js

      - name: Import macOS signing certificate
        if: matrix.platform == 'mac' && vars.SKIP_MAC_SIGNING != 'true'
        env:
          MAC_CERTIFICATE: ${{ secrets.MAC_CERTIFICATE }}
          MAC_CERTIFICATE_PASSWORD: ${{ secrets.MAC_CERTIFICATE_PASSWORD }}
        run: |
          if [ -z "$MAC_CERTIFICATE" ]; then
            echo "No certificate configured — skipping code signing"
            exit 0
          fi
          KEYCHAIN_PATH=$RUNNER_TEMP/build.keychain
          CERT_PATH=$RUNNER_TEMP/certificate.p12
          echo "$MAC_CERTIFICATE" | base64 --decode > "$CERT_PATH"
          security create-keychain -p "" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$MAC_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -k "" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db

      - name: Package (${{ matrix.platform }})
        run: npx electron-builder --${{ matrix.platform }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          CSC_IDENTITY_AUTO_DISCOVERY: 'false' # ${{ vars.SKIP_MAC_SIGNING == 'true' && 'false' || 'true' }}
          SKIP_NOTARIZE: 'true' # ${{ github.event_name == 'pull_request' && 'true' || 'false' }}

      - name: Zip win-unpacked directory
        if: matrix.platform == 'win'
        working-directory: dist/win-unpacked
        run: 7z a -tzip "../Claude-Dock-win-unpacked.zip" .
        shell: bash

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: claude-dock-${{ matrix.platform }}
          path: |
            dist/*.exe
            dist/*.dmg
            dist/*.AppImage
            dist/Claude-Dock-win-unpacked.zip
          if-no-files-found: error

      - name: Publish to bleeding-edge release
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Ensure the release exists
          gh release view bleeding-edge &>/dev/null || \
            gh release create bleeding-edge --prerelease \
              --title "Bleeding Edge Build" \
              --notes "Automated build from the latest commit on \`main\`."

          # Write platform SHA file
          echo "${{ github.sha }}" > "dist/${{ matrix.platform }}-sha.txt"

          # Upload main artifacts first, then plugin archives, then SHA files last
          for f in dist/*.exe dist/*.dmg dist/*.AppImage dist/Claude-Dock-win-unpacked.zip; do
            [ -f "$f" ] && gh release upload bleeding-edge "$f" --clobber
          done
          for f in dist/plugins.zip dist/plugins.update; do
            [ -f "$f" ] && gh release upload bleeding-edge "$f" --clobber
          done
          for f in dist/*-sha.txt; do
            [ -f "$f" ] && gh release upload bleeding-edge "$f" --clobber
          done

          # Update release notes
          gh release edit bleeding-edge --prerelease \
            --notes "$(cat <<'EOF'
          Automated build from the latest commit on \`main\`.

          **This is a pre-release and may be unstable.**

          Commit: ${{ github.sha }}
          EOF
          )"
