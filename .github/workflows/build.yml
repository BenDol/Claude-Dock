name: Build

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'scripts/**'
      - 'package.json'
      - 'package-lock.json'
      - 'tsconfig*.json'
      - 'electron.vite.config.*'
      - 'vitest.config.*'
      - '.github/workflows/build.yml'
  pull_request:
    branches: [main]
    paths:
      - 'src/**'
      - 'scripts/**'
      - 'package.json'
      - 'package-lock.json'
      - 'tsconfig*.json'
      - 'electron.vite.config.*'
      - 'vitest.config.*'
      - '.github/workflows/build.yml'
  workflow_dispatch:
    inputs:
      skip_tests:
        description: 'Skip tests'
        type: boolean
        default: false

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: win
          - os: macos-latest
            platform: mac
          - os: ubuntu-latest
            platform: linux

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install setuptools (needed by node-gyp)
        run: pip install setuptools

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # Cache node_modules (including compiled native modules like node-pty)
      # and electron/electron-builder downloads. On cache hit this skips
      # npm ci entirely, saving ~2-3 minutes on Windows.
      - name: Cache node_modules & Electron
        id: cache-deps
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            ~/AppData/Local/electron/Cache
            ~/Library/Caches/electron
            ~/.cache/electron
            ~/AppData/Local/electron-builder/Cache
            ~/Library/Caches/electron-builder
            ~/.cache/electron-builder
          key: deps-${{ matrix.platform }}-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        if: steps.cache-deps.outputs.cache-hit != 'true'
        run: npm ci

      - name: Run tests
        if: inputs.skip_tests != true
        run: npx vitest run

      - name: Build app
        run: npx electron-vite build
        env:
          UPDATE_PROFILE: bleeding-edge

      - name: Package (${{ matrix.platform }})
        run: npx electron-builder --${{ matrix.platform }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Zip win-unpacked directory
        if: matrix.platform == 'win'
        working-directory: dist/win-unpacked
        run: 7z a -tzip "../Claude-Dock-win-unpacked.zip" .
        shell: bash

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: claude-dock-${{ matrix.platform }}
          path: |
            dist/*.exe
            dist/*.dmg
            dist/*.AppImage
            dist/Claude-Dock-win-unpacked.zip
          if-no-files-found: error

  release:
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f

      - name: Create or update bleeding edge release
        uses: ncipollo/release-action@v1
        with:
          tag: bleeding-edge
          name: Bleeding Edge Build
          body: |
            Automated build from the latest commit on `main`.

            **This is a pre-release and may be unstable.**

            Commit: ${{ github.sha }}
          prerelease: true
          allowUpdates: true
          removeArtifacts: true
          artifacts: "artifacts/**/*"
          token: ${{ secrets.GITHUB_TOKEN }}
